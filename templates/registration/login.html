{% extends 'base.html' %}
{% block title %}Login - TaskFlow{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">✓</div>
            <h1>Welcome Back</h1>
            <p>Sign in to manage your tasks</p>
        </div>
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-error">{{ message }}</div>
        {% endfor %}
        {% endif %}
        <form method="POST" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{% url 'signup' %}">Create one</a></p>
    </div>
</div>
{% endblock %}
