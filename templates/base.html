<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskFlow{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    {% if user.is_authenticated %}
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'dashboard' %}" class="nav-brand">
                <span class="brand-icon">✓</span> TaskFlow
            </a>
            <div class="nav-right">
                <span class="nav-user">👤 {{ user.first_name|default:user.username }}</span>
                <a href="{% url 'task_create' %}" class="btn btn-primary btn-sm">+ New Task</a>
                <a href="{% url 'logout' %}" class="btn btn-outline btn-sm">Logout</a>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="main-content">
        {% if messages %}
        <div class="messages-container">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
